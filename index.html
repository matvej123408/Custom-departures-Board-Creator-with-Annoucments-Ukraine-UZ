<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UZ LED Board Local</title>

<style>
body { background:#000; color:#ff9900; font-family: monospace; text-align:center; }
h1 { margin:20px; }
.led { text-shadow:0 0 5px #ff9900,0 0 10px #ff6600,0 0 20px #ff3300; }
table { width:95%; margin:auto; border-collapse:collapse; }
th { border-bottom:2px solid #ff9900; padding:10px; }
td { padding:8px; border-bottom:1px solid #222; }
.flip { animation: flip 0.4s ease; }
@keyframes flip { 0%{transform:rotateX(90deg);opacity:0;} 100%{transform:rotateX(0);opacity:1;} }
.delay { color:red; animation: blink 1s infinite; }
@keyframes blink {50%{opacity:0.3;}}
input, button { padding:10px; margin:5px; }
.delete-btn { color:red; cursor:pointer; }
</style>
</head>

<body>

<h1 class="led">🚆 UZ LED BOARD LOCAL</h1>

<h3>Додати відправлення</h3>
<input id="line" placeholder="Номер поїзда">
<input id="direction" placeholder="Напрямок">
<input id="time" type="time">
<input id="platform" placeholder="Платформа">
<button onclick="addDeparture()">Додати</button>

<br>

<input id="tgToken" placeholder="Telegram Bot Token">
<input id="tgChat" placeholder="Telegram Chat ID">

<br>

<button onclick="exportDepartures()">📤 Експорт</button>
<input type="file" id="importFile" style="display:none;" onchange="importDepartures(event)">
<button onclick="document.getElementById('importFile').click()">📥 Імпорт</button>

<table>
<thead>
<tr>
<th>Поїзд</th><th>Напрямок</th><th>Час</th><th>Хв</th><th>Платформа</th><th>Статус</th><th>Дія</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="enableAudio()">🔊 Увімкнути звук</button>

<audio id="gong" src="gong.mp3"></audio>

<script>

// 🔊 Голоси
let voices = [];
speechSynthesis.onvoiceschanged = () => voices = speechSynthesis.getVoices();

// 🔊 Флаги
let spoken30 = new Set();
let spoken15 = new Set();
let spoken5 = new Set();
let spoken1 = new Set();
let spoken0 = new Set();

// 🔔 Telegram
function sendTelegram(text){
  const token = document.getElementById("tgToken").value;
  const chatId = document.getElementById("tgChat").value;
  if(!token || !chatId) return;

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:chatId,text})
  });
}

// 🔊 Включення звуку
function enableAudio(){
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance("Звук увімкнено");
  msg.lang = "uk-UA";
  speechSynthesis.speak(msg);
  const gong = document.getElementById("gong");
  gong.play().then(()=>gong.pause());
}

// ⏱ Час
function getMin(time){
 const now = new Date();
 const [h,m] = time.split(":").map(Number);
 const d = new Date();
 d.setHours(h); d.setMinutes(m); d.setSeconds(0);
 return Math.max(0, Math.round((d-now)/60000));
}

// 🔊 Озвучка
function speakWithGong(text){
  speechSynthesis.cancel();
  const gong = document.getElementById("gong");
  gong.currentTime = 0;
  gong.play();

  setTimeout(()=>{
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "uk-UA";
    msg.rate = 0.95;
    msg.voice = voices.find(v=>v.lang==="uk-UA")||voices[0];
    speechSynthesis.speak(msg);
  },1500);
}

// 💾 Storage
function saveDepartures(data){
  localStorage.setItem("departures", JSON.stringify(data));
}
function loadDepartures(){
  return JSON.parse(localStorage.getItem("departures")||"[]");
}

// ➕ Додати
function addDeparture(){
  const dep = {
    line: line.value,
    direction: direction.value,
    time: time.value,
    platform: platform.value
  };

  if(!dep.line || !dep.direction || !dep.time){
    alert("Заповніть всі поля");
    return;
  }

  const data = loadDepartures();
  data.push(dep);
  saveDepartures(data);

  line.value="";
  direction.value="";
  time.value="";
  platform.value="";

  render();
}

// ❌ Видалити
function deleteDeparture(i){
  const data = loadDepartures();
  data.splice(i,1);
  saveDepartures(data);
  render();
}

// 📤 Експорт
function exportDepartures(){
  const blob = new Blob([JSON.stringify(loadDepartures(),null,2)]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "departures.json";
  a.click();
}

// 📥 Імпорт
function importDepartures(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ()=>{
    saveDepartures(JSON.parse(reader.result));
    render();
  };
  reader.readAsText(file);
}

// 📊 Рендер
function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  loadDepartures().forEach((dep,i)=>{
    const mins = getMin(dep.time);

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${dep.line}</td>
      <td>${dep.direction}</td>
      <td>${dep.time}</td>
      <td>${mins}</td>
      <td>${dep.platform||"-"}</td>
      <td>${mins<=0?"ВІДПРАВЛЯЄТЬСЯ":"OK"}</td>
      <td onclick="deleteDeparture(${i})" class="delete-btn">❌</td>
    `;
    tbody.appendChild(row);

    const key = dep.line+dep.time;

    function notify(text){
      speakWithGong(text);
      sendTelegram(text);
    }

    if(mins===30 && !spoken30.has(key)){
      notify(`Шановні пасажири Починається Посадка на поїзд, номер, ${dep.line}, зі Сполученням, ${dep.direction} , відправиться, із ${dep.platform}., колії, через 30, хвилин`);
      spoken30.add(key);
    }

    if(mins===15 && !spoken15.has(key)){
      notify(`Шановні пасажири Продовжуеться Посадка на поїзд, номер, ${dep.line} зі Сполученням, ${dep.direction} відправиться, із ${dep.platform}., колії, через 15, хвилин`);
      spoken15.add(key);
    }

    if(mins===5 && !spoken5.has(key)){
      notify(`Шановні пасажири Закінчується Посадка на поїзд, номер, ${dep.line} зі Сполученням, ${dep.direction} відправиться, із ${dep.platform}., колії, через 5, хвилин`);
      spoken5.add(key);
    }

    if(mins===1 && !spoken1.has(key)){
      notify(`Шановні пасажири поїзд, номер, ${dep.line} зі Сполученням, ${dep.direction} відправляеться, із ${dep.platform}., колії, щасливої дороги`);
      spoken1.add(key);
    }

    if(mins<=0 && !spoken0.has(key)){
      spoken0.add(key);
      if(Math.random()<0.2){
        notify(`Шановні пасажири, на платформі ${dep.platform}. Будь ласка, заходьте у поїзд та не тримайте двери.`);
      }
    }

  });
}

setInterval(render,60000);
render();

</script>

</body>
</html>
